{% extends "AdminVideos/video_list_base.html" %}

{% load static %}

{% block filtro %}

<style id="filtros-platos-visual-style">
  .filtros-platos-card .btn-filtro-plato {
    color: var(--bs-secondary-color, #6c757d);
    background: var(--bs-white, #fff);
    border-color: var(--bs-border-color, #dee2e6);
  }

  .filtros-platos-card .btn-filtro-plato:hover {
    color: var(--bs-body-color, #212529);
    background: var(--bs-light, #f8f9fa);
    border-color: var(--bs-danger, #dc3545);
  }

  .filtros-platos-card .btn-check:checked + .btn-filtro-plato {
    color: var(--bs-body-color, #212529);
    background: var(--bs-white, #fff);
    border-color: var(--bs-danger, #dc3545);
    box-shadow: 0 0 0 .12rem rgba(var(--bs-danger-rgb, 220, 53, 69), .14);
    font-weight: 600;
  }

  .filtros-platos-card .btn-check:checked + .btn-filtro-plato i {
    color: var(--bs-danger, #dc3545);
  }

  .filtros-platos-card .filtro-keyword-box .input-group-text,
  .filtros-platos-card .filtro-keyword-box .form-control {
    background: var(--bs-white, #fff);
  }

  .filtros-platos-card .filtro-keyword-box.filtro-keyword-activo .input-group-text,
  .filtros-platos-card .filtro-keyword-box.filtro-keyword-activo .form-control {
    border-color: var(--bs-danger, #dc3545);
  }

  .filtros-platos-card .filtro-keyword-box.filtro-keyword-activo .input-group-text {
    color: var(--bs-danger, #dc3545);
  }

  .filtros-platos-card .filtro-keyword-box.filtro-keyword-activo .form-control {
    color: var(--bs-danger, #dc3545);
    font-weight: 600;
  }

  /* Filtro móvil: botón + resumen cuando el formulario vive en modal */
  .filtro-platos-mobile-shell {
    background: var(--bs-white, #fff);
    border-radius: .5rem;
    padding: .5rem;
  }

  .filtro-platos-mobile-summary {
    display: flex;
    flex-wrap: wrap;
    gap: .25rem;
    line-height: 1.2;
  }

  .filtro-platos-mobile-summary .badge {
    white-space: normal;
    text-align: left;
    border: 1px solid rgba(78, 115, 223, .22);
    box-shadow: 0 1px 2px rgba(0, 0, 0, .06);
    display: inline-flex;
    align-items: center;
    gap: .35rem;
  }

  .filtro-chip-remove {
    appearance: none;
    border: 0;
    background: transparent;
    color: inherit;
    font: inherit;
    line-height: 1;
    padding: 0 .1rem;
    margin: 0;
    cursor: pointer;
    opacity: .8;
  }

  .filtro-chip-remove:hover,
  .filtro-chip-remove:focus {
    opacity: 1;
    text-decoration: none;
  }

  .filtro-platos-mobile-summary .badge.text-bg-light {
    background: #fff !important;
    color: #2f3a4a !important;
  }

  .filtro-platos-mobile-summary .filtro-chip-light {
    background: #fff !important;
    color: #2f3a4a !important;
    border-color: rgba(78, 115, 223, .22) !important;
  }

  .filtro-platos-mobile-summary .filtro-chip-success {
    background: #198754 !important;
    color: #fff !important;
    border-color: #198754 !important;
  }

  .filtro-platos-mobile-summary:empty {
    display: none;
  }

  .filtro-platos-mobile-summary.is-empty {
    display: none;
  }

  #filtroPlatosModal .modal-body {
    background: #f8f9fc;
  }

  #filtroPlatosModal #form-filtros-platos {
    margin-bottom: 0 !important;
  }

  #filtroPlatosModal .filtros-platos-card {
    box-shadow: none !important;
  }
  .filtro-mobile-keyword-box {
    position: relative;
  }

  .filtro-mobile-keyword-box .form-control {
    padding-right: 2rem;
  }

  .filtro-mobile-keyword-clear {
    appearance: none;
    border: 0;
    background: transparent;
    color: #6c757d;
    width: 1.75rem;
    height: 100%;
    padding: 0;
    margin: 0;
    position: absolute;
    top: 0;
    right: 0;
    z-index: 5;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .filtro-mobile-keyword-clear:hover,
  .filtro-mobile-keyword-clear:focus {
    background: transparent;
    color: var(--bs-danger, #dc3545);
    outline: none;
    box-shadow: none;
  }

  .filtro-mobile-keyword-box.filtro-keyword-activo .filtro-mobile-keyword-clear {
    color: var(--bs-danger, #dc3545);
    background: transparent;
  }

</style>


<div id="filtroPlatosMobileControls" class="filtro-platos-mobile-shell d-md-none mb-2">
  <div class="d-flex align-items-stretch gap-2">

    <div class="input-group input-group-sm flex-grow-1 filtro-mobile-keyword-box {% if formulario.palabra_clave.value %}filtro-keyword-activo{% endif %}">
      <span class="input-group-text">
        <i class="fa-solid fa-magnifying-glass"></i>
      </span>

      <input
        type="text"
        class="form-control {% if formulario.palabra_clave.value %}text-danger fw-semibold{% endif %}"
        id="palabraClaveMobile"
        value="{{ formulario.palabra_clave.value|default:'' }}"
        placeholder="Buscar">

      <button
        type="button"
        class="filtro-mobile-keyword-clear {% if not formulario.palabra_clave.value %}d-none{% endif %}"
        id="limpiarPalabraClaveMobile"
        aria-label="Borrar palabra clave">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <button
      type="button"
      class="btn btn-primary btn-sm fw-semibold flex-shrink-0"
      data-bs-toggle="modal"
      data-bs-target="#filtroPlatosModal">
      <i class="fa-solid fa-sliders me-1"></i>
      Filtros
    </button>

  </div>

  <div id="filtroPlatosMobileSummary" class="filtro-platos-mobile-summary mt-2 d-none"></div>
</div>

<div id="filtroPlatosInlineHome" class="d-none d-md-block">

<form
  method="POST"
  id="form-filtros-platos"
  class="mb-3"
  data-listado-url="{% url 'ajax_listado_platos' %}">

  {% csrf_token %}

  <input type="hidden" name="tipopag" value="{{ tipopag }}">

  <div class="card border-0 shadow-sm rounded-3 bg-white filtros-platos-card">
    <div class="card-body px-3 py-2">
      <div class="d-flex align-items-center gap-2 flex-wrap">

        <div class="input-group input-group-sm w-auto flex-grow-1 filtro-keyword-box {% if formulario.palabra_clave.value %}filtro-keyword-activo{% endif %}" style="max-width: 360px;">
          <span class="input-group-text">
            <i class="fa-solid fa-magnifying-glass"></i>
          </span>

          <input
            type="search"
            class="form-control {% if formulario.palabra_clave.value %}text-danger fw-semibold{% endif %}"
            placeholder="Buscar por palabra clave"
            name="palabra_clave"
            value="{{ formulario.palabra_clave.value|default:'' }}">
        </div>

        <input
          class="btn-check"
          type="checkbox"
          name="quecomemos"
          value="quecomemos"
          id="quecomemos"
          autocomplete="off"
          {% if quecomemos_ck == "quecomemos" %}checked{% endif %}
        >
        <label class="btn btn-sm btn-filtro-plato mb-0" for="quecomemos">
          <i class="fa-solid fa-wand-magic-sparkles me-1"></i>
          Sugerencia quecomemos
        </label>

        <input
          class="btn-check"
          type="checkbox"
          name="misplatos"
          value="misplatos"
          id="misplatos"
          autocomplete="off"
          {% if misplatos_ck == "misplatos" %}checked{% endif %}
        >
        <label class="btn btn-sm btn-filtro-plato mb-0" for="misplatos">
          <i class="fa-solid fa-user me-1"></i>
          Mis platos
        </label>

        <div class="input-group input-group-sm w-auto">

          <button
            type="button"
            class="btn btn-primary fw-semibold"
            data-bs-toggle="modal"
            data-bs-target="#loQueTengoModal">
            <i class="fa-solid fa-basket-shopping me-1"></i>
            Lo que tengo <span id="loQueTengoContador"></span>
          </button>

          <input
            class="btn-check"
            type="checkbox"
            name="usar_lo_que_tengo"
            value="1"
            id="usarLoQueTengo"
            autocomplete="off"
            {% if usar_lo_que_tengo_ck == "1" %}checked{% endif %}
          >
          <label class="btn btn-filtro-plato mb-0" for="usarLoQueTengo">
            Usar para filtrar
          </label>
        </div>

      </div>
    </div>
  </div>
</form>

</div>




<!-- Modal móvil para el filtro de platos.
     Importante: no duplica el form; JS mueve #form-filtros-platos acá sólo en celular. -->
<div
  class="modal fade"
  id="filtroPlatosModal"
  tabindex="-1"
  aria-labelledby="filtroPlatosModalLabel"
  aria-hidden="true">
  <div class="modal-dialog modal-dialog-scrollable modal-fullscreen-sm-down modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header py-2">
        <h5 class="modal-title" id="filtroPlatosModalLabel">
          <i class="fa-solid fa-sliders me-1"></i>
          Filtros
        </h5>

        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>

      <div class="modal-body" id="filtroPlatosModalBody"></div>

      <div class="modal-footer py-2">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">
          Cerrar
        </button>
      </div>

    </div>
  </div>
</div>

<div
  class="modal fade"
  id="loQueTengoModal"
  tabindex="-1"
  aria-labelledby="loQueTengoModalLabel"
  aria-hidden="true"
  data-palabras-url="{% url 'ajax-lo-que-tengo-palabras' %}"
  data-agregar-url="{% url 'ajax-lo-que-tengo-agregar' %}"
  data-sugerencias-url="{% url 'api_ingredientes' %}">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="loQueTengoModalLabel">
          Lo que tengo
        </h5>

        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>

      <div class="modal-body">
        <p class="small text-muted mb-2">
          Agregá palabras clave para filtrar platos. Podés elegir ingredientes existentes o escribir texto libre.
        </p>

        <div class="input-group mb-2">
          <select id="loQueTengoSelect" class="form-select" style="width: 100%;"></select>
        </div>

        <button type="button" class="btn btn-success btn-sm mb-3" id="loQueTengoAgregarBtn">
          Agregar
        </button>

        <div class="alert alert-danger d-none small" id="loQueTengoError"></div>

        <ul class="list-group" id="loQueTengoLista">
          <li class="list-group-item text-muted small">
            Cargando...
          </li>
        </ul>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">
          Cerrar
        </button>
      </div>

    </div>
  </div>
</div>



<script>
// FILTRO RESPONSIVE: INLINE EN DESKTOP, MODAL EN MÓVIL
// ----------------------------------------------------
// No se clona el formulario. Se mueve el mismo #form-filtros-platos
// para no duplicar IDs, eventos ni comportamiento AJAX.
(function () {
  const media = window.matchMedia("(max-width: 767.98px)");

  function getForm() {
    return document.getElementById("form-filtros-platos");
  }

  function getHome() {
    return document.getElementById("filtroPlatosInlineHome");
  }

  function getModalBody() {
    return document.getElementById("filtroPlatosModalBody");
  }

  function escapeHTML(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }


  function badge(texto, clase, filtro) {
    const label = escapeHTML(texto);
    const key = escapeHTML(filtro || "");

    return ''
      + '<span class="badge rounded-pill ' + clase + '">'
      + '<span>' + label + '</span>'
      + '<button type="button" class="filtro-chip-remove" '
      + 'data-filtro-chip-remove="' + key + '" '
      + 'aria-label="Quitar filtro ' + label + '">'
      + '&times;'
      + '</button>'
      + '</span>';
  }

  function dispararCambioFiltro(input) {
    if (!input) return;

    input.dispatchEvent(new Event("input", { bubbles: true }));
    input.dispatchEvent(new Event("change", { bubbles: true }));
  }

  function desactivarFiltroMobile(filtro) {
    const form = getForm();
    if (!form) return;

    let input = null;

    if (filtro === "quecomemos") {
      input = form.querySelector('input[name="quecomemos"]');
    }

    if (filtro === "misplatos") {
      input = form.querySelector('input[name="misplatos"]');
    }

    if (filtro === "loquetengo") {
      input =
        form.querySelector('input[name="usar_lo_que_tengo"]') ||
        form.querySelector('input[name="usarLoQueTengo"]') ||
        form.querySelector('#usarLoQueTengo');
    }

    if (!input) return;

    input.checked = false;
    dispararCambioFiltro(input);
    actualizarResumenMobile();
  }

  function actualizarResumenMobile() {
    const form = getForm();
    const summary = document.getElementById("filtroPlatosMobileSummary");

    if (!form || !summary) return;

    const chips = [];

    const tipopag = form.querySelector('input[name="tipopag"]')?.value || "";
    const quecomemos = form.querySelector('input[name="quecomemos"]')?.checked;
    const misplatos = form.querySelector('input[name="misplatos"]')?.checked;
    const usarLoQueTengo = (
      tipopag === "LoQueTengo" ||
      form.querySelector('input[name="usar_lo_que_tengo"]')?.checked ||
      form.querySelector('input[name="usarLoQueTengo"]')?.checked ||
      form.querySelector('#usarLoQueTengo')?.checked
    );

    if (quecomemos) {
      chips.push(badge("Quecomemos", "filtro-chip-light", "quecomemos"));
    }

    if (misplatos) {
      chips.push(badge("Mis platos", "filtro-chip-light", "misplatos"));
    }

    if (usarLoQueTengo) {
      chips.push(badge("Lo que tengo", "filtro-chip-success", "loquetengo"));
    }

    summary.innerHTML = chips.join(" ");
    summary.classList.toggle("is-empty", chips.length === 0);
    summary.classList.toggle("d-none", chips.length === 0);
  }

  function ocultarModalFiltroSiHaceFalta() {
    const modalEl = document.getElementById("filtroPlatosModal");

    if (!modalEl || !window.bootstrap || !bootstrap.Modal) return;

    const instance = bootstrap.Modal.getInstance(modalEl);

    if (instance && modalEl.classList.contains("show")) {
      instance.hide();
    }
  }

  function moverFormSegunPantalla() {
    const form = getForm();
    const home = getHome();
    const modalBody = getModalBody();

    if (!form || !home || !modalBody) return;

    if (media.matches) {
      if (form.parentElement !== modalBody) {
        modalBody.appendChild(form);
      }

      form.classList.remove("mb-3");
      form.classList.add("mb-0");
    } else {
      if (form.parentElement !== home) {
        home.appendChild(form);
      }

      form.classList.add("mb-3");
      form.classList.remove("mb-0");
      ocultarModalFiltroSiHaceFalta();
    }

    actualizarResumenMobile();
  }

  function syncKeywordMobileDesdeReal() {
    const form = getForm();
    const mobile = document.getElementById("palabraClaveMobile");
    const real = form ? form.querySelector('input[name="palabra_clave"]') : null;

    if (!mobile || !real) return;

    if (mobile.value !== real.value) {
      mobile.value = real.value || "";
    }

    const activo = !!mobile.value.trim();

    mobile.classList.toggle("text-danger", activo);
    mobile.classList.toggle("fw-semibold", activo);

    const box = mobile.closest(".filtro-mobile-keyword-box");
    if (box) {
      box.classList.toggle("filtro-keyword-activo", activo);
    }

    const clearBtn = document.getElementById("limpiarPalabraClaveMobile");
    if (clearBtn) {
      clearBtn.classList.toggle("d-none", !activo);
    }
  }

  function syncKeywordRealDesdeMobile() {
    const form = getForm();
    const mobile = document.getElementById("palabraClaveMobile");
    const real = form ? form.querySelector('input[name="palabra_clave"]') : null;

    if (!mobile || !real) return;

    real.value = mobile.value;
    real.dispatchEvent(new Event("input", { bubbles: true }));
    real.dispatchEvent(new Event("change", { bubbles: true }));

    syncKeywordMobileDesdeReal();
  }

  function initFiltroResponsiveMobile() {
    moverFormSegunPantalla();

    const form = getForm();
    const mobileKeyword = document.getElementById("palabraClaveMobile");

    if (form && !form.dataset.resumenMobileBound) {
      form.dataset.resumenMobileBound = "1";
      form.addEventListener("change", function () {
        syncKeywordMobileDesdeReal();
        actualizarResumenMobile();
      });
      form.addEventListener("input", function () {
        syncKeywordMobileDesdeReal();
        actualizarResumenMobile();
      });
      form.addEventListener("submit", function () {
        window.setTimeout(function () {
          syncKeywordMobileDesdeReal();
          actualizarResumenMobile();
        }, 0);
      });
    }

    if (mobileKeyword && !mobileKeyword.dataset.keywordMobileBound) {
      mobileKeyword.dataset.keywordMobileBound = "1";

      mobileKeyword.addEventListener("input", syncKeywordRealDesdeMobile);
      mobileKeyword.addEventListener("change", syncKeywordRealDesdeMobile);

      mobileKeyword.addEventListener("keydown", function (event) {
        if (event.key !== "Enter") return;

        event.preventDefault();
        syncKeywordRealDesdeMobile();

        const form = getForm();
        if (form) {
          form.requestSubmit ? form.requestSubmit() : form.submit();
        }
      });
    }

    syncKeywordMobileDesdeReal();
    actualizarResumenMobile();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initFiltroResponsiveMobile);
  } else {
    initFiltroResponsiveMobile();
  }

  if (media.addEventListener) {
    media.addEventListener("change", moverFormSegunPantalla);
  } else if (media.addListener) {
    media.addListener(moverFormSegunPantalla);
  }

  document.addEventListener("shown.bs.modal", function (event) {
    if (event.target && event.target.id === "filtroPlatosModal") {
      actualizarResumenMobile();
    }
  });

  document.addEventListener("hidden.bs.modal", function (event) {
    if (event.target && event.target.id === "filtroPlatosModal") {
      actualizarResumenMobile();
    }
  });

  document.addEventListener("click", function (event) {
    const clearKeywordBtn = event.target.closest("#limpiarPalabraClaveMobile");
    if (!clearKeywordBtn) return;

    event.preventDefault();
    event.stopPropagation();

    const mobile = document.getElementById("palabraClaveMobile");
    if (!mobile) return;

    mobile.value = "";
    syncKeywordRealDesdeMobile();

    const form = getForm();
    if (form) {
      form.requestSubmit ? form.requestSubmit() : form.submit();
    }
  });

  document.addEventListener("click", function (event) {
    const removeBtn = event.target.closest("[data-filtro-chip-remove]");
    if (!removeBtn) return;

    event.preventDefault();
    event.stopPropagation();

    desactivarFiltroMobile(removeBtn.dataset.filtroChipRemove);
  });

  // Si desde el modal de filtros se abre "Lo que tengo", cerramos primero filtros.
  document.addEventListener("click", function (event) {
    const triggerLoQueTengo = event.target.closest('[data-bs-target="#loQueTengoModal"]');

    if (!triggerLoQueTengo) return;

    const filtroModal = document.getElementById("filtroPlatosModal");

    if (filtroModal && filtroModal.classList.contains("show")) {
      window.setTimeout(ocultarModalFiltroSiHaceFalta, 0);
    }
  });
})();
</script>

<script src="{% static 'AdminVideos/js/filtros_platos.js' %}?v=22"></script>
<script src="{% static 'AdminVideos/js/lo_que_tengo.js' %}?v=3"></script>

{% endblock %}
