{% extends "AdminVideos/video_list_base.html" %}

{% load static %}

{% block filtro %}

<form 
  method="POST" 
  id="form-filtros-platos"
  data-listado-url="{% url 'ajax_listado_platos' %}">
    <div class="d-flex justify-content-start mx-1 gap-4 flex-wrap">

    {% csrf_token %}

    <input type="hidden" name="tipopag" value="{{ tipopag }}">

    <div class="input-group w-auto">
      <input 
        type="search" 
        class="form-control {% if formulario.palabra_clave.value %} border-danger text-danger {% endif %}" 
        placeholder="Buscar por palabra clave" 
        name="palabra_clave" 
        value="{{ formulario.palabra_clave.value|default:'' }}">
      
      <button type="submit" class="btn btn-primary">
        ➔
      </button>
    </div>

    <div class="form-check">
      <input class="form-check-input" type="checkbox" name="quecomemos" value="quecomemos" id="quecomemos" {% if quecomemos_ck == "quecomemos" %} checked {% endif %}>
        <label class="form-check-label small" for="quecomemos">
        Sugerencia <br> quecomemos
      </label>
    </div>

    <div class="form-check">
      <input class="form-check-input" type="checkbox" name="misplatos" value="misplatos" id="misplatos" {% if misplatos_ck == "misplatos" %} checked {% endif %}>
      <label class="form-check-label small" for="misplatos">
        Mis platos
      </label>
    </div>

        <!-- Campo oculto -->
       <!-- <input type="hidden" name="misplatos" value="misplatos">  -->

  </div>
</form>

<!-- =========================================================
     FILTROS DE PLATOS - ACTUALIZACIÓN AJAX DEL LISTADO
     ---------------------------------------------------------
     Qué hace:
     - Intercepta el submit del formulario de filtros.
     - Envía los datos por POST usando fetch().
     - Recibe HTML renderizado desde Django.
     - Reemplaza solo #contenedor-listado-platos.
     - Evita refrescar toda la página.
     - Reinicializa la selección masiva después de insertar HTML nuevo.
========================================================= -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  const form = document.getElementById("form-filtros-platos");
  const contenedor = document.getElementById("contenedor-listado-platos");

  if (!form || !contenedor) return;

  
  function actualizarListadoPlatos() {
    const url = form.dataset.listadoUrl;
    const formData = new FormData(form);

    fetch(url, {
      method: "POST",
      body: formData,
      headers: {
        "X-Requested-With": "XMLHttpRequest"
      }
    })
    .then(function (response) {
      if (!response.ok) {
        throw new Error("Error al cargar el listado");
      }

      return response.json();
    })
    
  
    .then(function (data) {
      contenedor.innerHTML = data.html_listado;

      const contenedorCarousel = document.getElementById("contenedor-carousel-platos");
      if (contenedorCarousel) {
        contenedorCarousel.innerHTML = data.html_carousel;
      }

      const contenedorLugares = document.getElementById("contenedor-listado-lugares");
      if (contenedorLugares) {
        contenedorLugares.innerHTML = data.html_lugares;
      }

      if (typeof initListadoPlatos === "function") {
        initListadoPlatos();
      }
    })

    .catch(function (error) {
      console.error(error);
    });
  }

  form.addEventListener("submit", function (event) {
    event.preventDefault();
    actualizarListadoPlatos();
  });

  form.querySelectorAll("input[type='checkbox']").forEach(function (checkbox) {
    checkbox.addEventListener("change", function () {
      actualizarListadoPlatos();
    });
  });


  document.addEventListener("click", function (event) {
    const link = event.target.closest(".js-eliminar-programado");


    if (!link) {
      return;
    }

    const contenedorMenuProgramado = document.getElementById("contenedor-menu-programado-dias");
    const ajaxUrl = link.dataset.ajaxUrl;

    // Si falta algo, NO prevenimos el click:
    // dejamos que funcione el href clásico.
    if (!contenedorMenuProgramado || !ajaxUrl || !window.fetch) {
      return;
    }

    event.preventDefault();

    const body = new URLSearchParams({
      es_lugar: link.dataset.esLugar || "",
      objeto_id: link.dataset.objetoId || "",
      comida: link.dataset.comida || "",
      fecha: link.dataset.fecha || ""
    });

    fetch(ajaxUrl, {
      method: "POST",
      body: body.toString(),
      headers: {
        "X-CSRFToken": "{{ csrf_token }}",
        "X-Requested-With": "XMLHttpRequest",
        "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8"
      }
    })
    .then(function (response) {
      if (!response.ok) {
        throw new Error("Error al eliminar programado");
      }

      return response.json();
    })

    .then(function (data) {
      if (!data.ok) {
        throw new Error("Respuesta inválida al eliminar programado");
      }

      const itemProgramado = link.closest(".mb-1");

      if (itemProgramado) {
        const extrasProgramado = itemProgramado.nextElementSibling;

        if (
          extrasProgramado &&
          (
            extrasProgramado.classList.contains("ms-5") ||
            extrasProgramado.classList.contains("ms-4")
          )
        ) {
          extrasProgramado.remove();
        }

        itemProgramado.remove();
      }
    })


    .catch(function (error) {
        console.error(error);
    });
  }, true);

});
</script>



{% endblock %}
