<form method="post"
      action="{% url 'solicitar-amistad' %}"
      id="solicitarAmistadForm">
  {% csrf_token %}

  {% if form.errors %}
    <div class="alert alert-danger small">
      <p class="mb-2">Corregí los siguientes errores:</p>

      <ul class="mb-0">
        {% for field, errors in form.errors.items %}
          {% for error in errors %}
            <li>{{ error }}</li>
          {% endfor %}
        {% endfor %}
      </ul>
    </div>
  {% endif %}

  <div class="mb-3">
    <label class="form-label small font-weight-bold" for="{{ form.destinatario.id_for_label }}">
      Usuario
    </label>
    {{ form.destinatario }}
  </div>

  <div class="mb-3">
    <label class="form-label small font-weight-bold" for="{{ form.mensaje.id_for_label }}">
      Mensaje
    </label>
    {{ form.mensaje }}
  </div>

  <div class="d-flex justify-content-end gap-2">
    <button type="button"
            class="btn btn-outline-secondary btn-sm"
            data-bs-dismiss="modal">
      Cancelar
    </button>

    <button type="submit" class="btn btn-primary btn-sm">
      Enviar solicitud
    </button>
  </div>
</form>
