
<!-- MODAL GENÉRICO DE CONFIRMACIÓN -->
<div class="modal fade" id="confirmActionModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="confirmActionTitle">Confirmar acción</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>

      <div class="modal-body">
        <div id="confirmActionBody">¿Seguro?</div>
        <div class="text-muted small mt-2" id="confirmActionHint">Esta acción no se puede deshacer.</div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-danger" id="confirmActionBtn">Sí, continuar</button>
      </div>

    </div>
  </div>
</div>

<!-- FORM ÚNICO (POST + CSRF) -->
<form id="confirmActionForm" method="post" class="d-none">
  {% csrf_token %}
</form>

<!-- Paso 8.5: modal genérico de confirmación compatible con acción individual y eliminación masiva -->
<script>
  (function () {
    const modalEl        = document.getElementById("confirmActionModal");
    const titleEl        = document.getElementById("confirmActionTitle");
    const bodyEl         = document.getElementById("confirmActionBody");
    const hintEl         = document.getElementById("confirmActionHint");
    const btnEl          = document.getElementById("confirmActionBtn");
    const formEl         = document.getElementById("confirmActionForm");
    const bulkDeleteForm = document.getElementById("bulk-delete-form");

    let submitMode = "default";
    let ajaxRefreshTarget = null;
    let ajaxReopenDropdown = null;

    if (!modalEl || !titleEl || !bodyEl || !btnEl || !formEl) return;

    function buildPanelMessage(message, level) {
      if (!message) {
        return "";
      }

      const safeLevel = ["success", "danger", "warning", "info"].includes(level)
        ? level
        : "info";

      return `
        <div class="px-3 pt-3">
          <div class="alert alert-${safeLevel} py-2 px-3 mb-2 small" role="alert">
            ${message}
          </div>
        </div>
      `;
    }

    modalEl.addEventListener("show.bs.modal", function (event) {
      const trigger = event.relatedTarget;
      if (!trigger) return;

      const title      = trigger.getAttribute("data-confirm-title") || "Confirmar acción";
      const body       = trigger.getAttribute("data-confirm-body") || "¿Seguro que querés continuar?";
      const action     = trigger.getAttribute("data-confirm-action");
      const btnTxt     = trigger.getAttribute("data-confirm-btn") || "Sí, continuar";
      const hint       = trigger.getAttribute("data-confirm-hint");
      const submitForm = trigger.getAttribute("data-confirm-submit-form");
      const ajax       = trigger.getAttribute("data-confirm-ajax") === "true";

      ajaxRefreshTarget = trigger.getAttribute("data-confirm-refresh-target");
      ajaxReopenDropdown = trigger.getAttribute("data-confirm-reopen-dropdown");

      titleEl.textContent = title;
      bodyEl.innerHTML = body;
      btnEl.textContent = btnTxt;

      if (hint === null) {
        hintEl.textContent = "Esta acción no se puede deshacer.";
        hintEl.classList.remove("d-none");
      } else if (hint === "") {
        hintEl.classList.add("d-none");
      } else {
        hintEl.textContent = hint;
        hintEl.classList.remove("d-none");
      }

      if (submitForm === "bulk-delete-form") {
        submitMode = "bulk-delete";
        btnEl.disabled = !bulkDeleteForm;
        formEl.removeAttribute("action");
        return;
      }

      if (ajax) {
        submitMode = "ajax";
      } else {
        submitMode = "default";
      }

      if (!action) {
        btnEl.disabled = true;
        formEl.removeAttribute("action");
      } else {
        btnEl.disabled = false;
        formEl.setAttribute("action", action);
      }
    });

    btnEl.addEventListener("click", function () {
      if (submitMode === "bulk-delete") {
        if (!bulkDeleteForm) return;
        bulkDeleteForm.submit();
        return;
      }

      const action = formEl.getAttribute("action");
      if (!action) return;

      if (submitMode === "ajax") {
        btnEl.disabled = true;

        fetch(action, {
          method: "POST",
          body: new FormData(formEl),
          headers: {
            "X-Requested-With": "XMLHttpRequest"
          },
          credentials: "same-origin"
        })
          .then(response => {
            if (!response.ok) {
              throw new Error("No se pudo completar la acción.");
            }

            return response.json();
          })
          .then(data => {
            const target = ajaxRefreshTarget
              ? document.querySelector(ajaxRefreshTarget)
              : null;

            if (target && data.html) {
              target.innerHTML = buildPanelMessage(data.message, data.level) + data.html;
            }

            const badge = document.getElementById("amiguesBadge");
            if (badge) {
              const cantidad = data.cantidad || 0;

              if (cantidad > 0) {
                badge.textContent = cantidad;
                badge.classList.remove("d-none");
              } else {
                badge.textContent = "";
                badge.classList.add("d-none");
              }
            }

            const modal = bootstrap.Modal.getInstance(modalEl);
            if (modal) {
              modal.hide();
            }

            if (ajaxReopenDropdown) {
              modalEl.addEventListener(
                "hidden.bs.modal",
                function () {
                  const dropdownEl = document.querySelector(ajaxReopenDropdown);

                  if (dropdownEl && bootstrap.Dropdown) {
                    const dropdown = bootstrap.Dropdown.getOrCreateInstance(dropdownEl);
                    dropdown.show();
                  }
                },
                { once: true }
              );
            }
          })
          .catch(error => {
            console.warn(error);
            alert("No se pudo completar la acción. Revisá la consola.");
          })
          .finally(() => {
            btnEl.disabled = false;
          });

        return;
      }

      formEl.submit();
    });
  })();
</script>
