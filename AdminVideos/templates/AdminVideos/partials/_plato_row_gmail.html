<div class="list-group-item text-dark px-2 py-2 border-bottom border-secondary-subtle list-group-item-action plato-row js-plato-carousel-index {% if user.id == plato.propietario.id and not plato.proviene_de %}plato-row-procedencia-propia{% elif user.id == plato.propietario.id and plato.proviene_de %}plato-row-procedencia-importada{% else %}plato-row-procedencia-ajena{% endif %}"
     data-row
     data-plato-id="{{ plato.id }}"
     data-plato-nombre="{% if plato.variedades_count > 0 %}{{ plato.nombre_para_front|escape }}{% else %}{{ plato.nombre_plato|escape }}{% endif %}"
     role="button"
     tabindex="0">

  <div class="d-flex align-items-center gap-2">

    <div class="form-check m-0 flex-shrink-0">
      <input class="form-check-input js-plato-select"
             type="checkbox"
             name="platos_selected"
             value="{{ plato.id }}"
             aria-label="Seleccionar plato">
    </div>

    <div class="flex-grow-1 min-w-0 fw-semibold text-truncate">
      {% if plato.variedades_count > 0 %}
        {{ plato.nombre_para_front }} <a href="#"
           class="btn plato-gmail-programar-btn btn-programar"
           data-bs-toggle="modal"
           data-bs-target="#asignarPlatoModal"
           onclick="event.preventDefault(); event.stopPropagation(); setPlatoInfo('{{ plato.id }}', 'plato', '{% if plato.variedades_count > 0 %}{{ plato.nombre_para_front|escapejs }}{% else %}{{ plato.nombre_plato|escapejs }}{% endif %}')"
           title="Programar"
           aria-label="Programar">
          <i class="fa-regular fa-calendar-plus" aria-hidden="true"></i>
        </a>
      {% else %}
        {{ plato.nombre_plato }} <a href="#"
           class="btn plato-gmail-programar-btn btn-programar"
           data-bs-toggle="modal"
           data-bs-target="#asignarPlatoModal"
           onclick="event.preventDefault(); event.stopPropagation(); setPlatoInfo('{{ plato.id }}', 'plato', '{% if plato.variedades_count > 0 %}{{ plato.nombre_para_front|escapejs }}{% else %}{{ plato.nombre_plato|escapejs }}{% endif %}')"
           title="Programar"
           aria-label="Programar">
          <i class="fa-regular fa-calendar-plus" aria-hidden="true"></i>
        </a>
      {% endif %}
    </div>

  </div>
</div>
