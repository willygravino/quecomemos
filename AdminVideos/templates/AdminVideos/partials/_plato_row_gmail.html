<div class="list-group-item text-dark px-2 py-2 border-bottom border-secondary-subtle list-group-item-action plato-row js-abrir-detalle-plato"
     data-row
     data-plato-id="{{ plato.id }}"
     data-template-id="platoDetalleTemplate-{{ plato.id }}"
     data-plato-nombre="{% if plato.variedades_count > 0 %}{{ plato.nombre_para_front|escape }}{% else %}{{ plato.nombre_plato|escape }}{% endif %}"
     role="button"
     tabindex="0">

  <div class="d-flex align-items-center gap-2">

    <div class="form-check m-0 flex-shrink-0">
      <input class="form-check-input js-plato-select"
             type="checkbox"
             name="platos_selected"
             value="{{ plato.id }}"
             aria-label="Seleccionar plato">
    </div>

    <div class="flex-grow-1 min-w-0 fw-semibold text-truncate">
      {% if plato.variedades_count > 0 %}
        {{ plato.nombre_para_front }}
      {% else %}
        {{ plato.nombre_plato }}
      {% endif %}
    </div>

  </div>
</div>

<template id="platoDetalleTemplate-{{ plato.id }}">
  {% include "AdminVideos/partials/_plato_card_detalle_modal.html" with plato_detalle=plato %}
</template>
